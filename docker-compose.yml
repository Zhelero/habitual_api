services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: habitual
      POSTGRES_PASSWORD: habitual
      POSTGRES_DB: habitual
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U habitual"]
      interval: 5s
      timeout: 5s
      retries: 5


  app:
    profiles: ["app"]
    build:
      context: .
      target: runtime
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://habitual:habitual@db:5432/habitual
      SECRET_KEY: dev_secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Overridable from the shell, e.g. for e2e test runs that register/log
      # in far more often per minute than a real user ever would:
      #   LOGIN_RATE_LIMIT=1000/minute REGISTER_RATE_LIMIT=1000/minute docker compose --profile app up -d
      LOGIN_RATE_LIMIT: ${LOGIN_RATE_LIMIT:-5/minute}
      REGISTER_RATE_LIMIT: ${REGISTER_RATE_LIMIT:-10/minute}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000


  test:
    profiles: [ "test" ]
    build:
      context: .
      target: dev
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://habitual:habitual@db:5432/habitual_test
      SECRET_KEY: test-secret
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PYTHONPATH: /app
    command: pytest --cov=app --cov-report=term-missing --cov-fail-under=90
    

volumes:
  postgres_data:
    name: habitual_postgres_data