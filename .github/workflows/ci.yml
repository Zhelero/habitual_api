name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - run: docker compose build

      - name: Ruff
        run: docker compose run --rm test ruff check .

      - name: Black
        run: docker compose run --rm test black --check .

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies for known vulnerabilities
        run: pip-audit -r requirements.txt -r requirements-dev.txt -r requirements-test.txt

  migrations:
    runs-on: ubuntu-latest
    needs: [ lint, dependency-audit ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: docker compose build

      - name: Check for divergent alembic heads
        run: |
          heads=$(docker compose run --rm test alembic heads | grep -c '(head)')
          if [ "$heads" -ne 1 ]; then
            echo "Expected exactly 1 alembic head, found $heads. There's an unmerged migration branch — rebase and run 'alembic merge heads'."
            exit 1
          fi

      - name: Check models match latest migration
        run: docker compose run --rm test sh -c "alembic upgrade head && alembic check"

  test:
    runs-on: ubuntu-latest
    needs: migrations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build containers
        run: docker compose build --no-cache

      - name: Run tests with coverage
        run: docker compose --profile test run --rm test

  api-contract-tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start API + database
        run: docker compose --profile app up -d --build db app

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API did not become healthy in time"
          docker compose logs app
          exit 1

      - name: Run Postman collection with Newman
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}/postman:/etc/newman" \
            postman/newman:latest \
            run collection.json -e environment.json

      - name: API logs (on failure)
        if: failure()
        run: docker compose logs app db

      - name: Tear down
        if: always()
        run: docker compose --profile app down -v